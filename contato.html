<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título -->
  <title>Contato — Vagner Machado</title>

  <!-- Descrição -->
  <meta name="description" content="Entre em contato com Vagner Machado através do formulário.">

  <!-- CSS -->
  <script>
    (function(){
      try{
        const saved = localStorage.getItem('theme');
        if(saved === 'dark' || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)){
          document.documentElement.setAttribute('data-theme','dark');
        } else {
          document.documentElement.setAttribute('data-theme','light');
        }
      }catch(e){/* ignore */}
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">

  <!-- JavaScript -->
  <script src="js/script.js" defer></script>
</head>
<body>

  <!-- Menu de navegação -->
  <nav>
    <a href="index.html">Sobre Mim</a>
    <a href="formacao.html">Formação</a>
    <a href="portfolio.html">Portfólio</a>
    <a href="contato.html">Contato</a>
  </nav>

  <!-- Conteúdo principal -->
  <main class="container">

    <h1>Contato</h1>

    <!-- Formulário de contato -->
    <form id="formContato" novalidate>

      <!-- Campo nome -->
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
      </div>

      <!-- Campo e-mail -->
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
      </div>

      <!-- Campo mensagem -->
      <div class="form-group">
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>
      </div>

      <!-- Botão -->
      <button type="submit">Enviar</button>
    </form>

    <!-- Mensagem de retorno -->
    <p id="resultado" aria-live="polite" role="status"></p>

  </main>

  <!-- Rodapé -->
  <footer>
    <p>© 2026 - Vagner Machado</p>
  </footer>

</body>
</html>
